services:
  prometheus-metrics:
    image: prom/prometheus:v2.45.6
    # container_name: prometheus-metrics
    ports:
      - "${P_PROMETHEUS}:9090"
    networks:
      - metrics-network
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    # container_name: grafana
    ports:
      - "${P_GRAFANA}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    networks:
      - metrics-network
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ../monitoring/grafana/provisioning/dashboards/storage:/var/lib/grafana/dashboards:ro

  node-exporter:
    image: prom/node-exporter:v1.8.1
    # container_name: node-exporter
    restart: unless-stopped
    ports:
      - "${P_NODE_EXPORTER}:9100"
    networks:
      - metrics-network

networks:
  metrics-network:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_metrics

volumes:
  grafana-storage: