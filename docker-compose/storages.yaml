services:
  postgres-db:
    image: postgres:16.4-bookworm
    # container_name: postgres-db
    env_file:
      - ../.env
    ports:
      - "${P_POSTGRES}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    # container_name: pgadmin
    env_file:
      - ../.env
    ports:
      - "${P_PGADMIN}:80"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - backend-network

networks:
  backend-network:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_backend

volumes:
  postgres_data:
    name: "${COMPOSE_PROJECT_NAME}_pg_data"   # => pet_care_pg_data
    labels:
      project: "${COMPOSE_PROJECT_NAME}"      # => project=pet_care
      role: "database"