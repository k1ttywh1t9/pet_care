global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'locust-exporter'
    static_configs:
      - targets: ['locust-exporter:9646']

  - job_name: 'main-app'
    static_configs:
      - targets: ['main-app:8000']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']